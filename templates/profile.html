<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Hub | Identity Profile</title>
    <!-- استدعاء أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-deep: #050811;
            --card-glass: rgba(22, 27, 38, 0.8);
            --primary-blue: #2563eb;
            --accent-cyan: #0ea5e9;
            --admin-red: #ef4444;
            --manager-gold: #f59e0b;
            --user-green: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at bottom right, #1e293b, #050811);
            color: var(--text-main);
            font-family: 'Inter', sans-serif !important;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* أنيميشن دخول الصفحة بالكامل */
        @keyframes profileEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .profile-wrapper {
            width: 100%;
            max-width: 480px;
            animation: profileEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .profile-card {
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            border-radius: 2.5rem;
            padding: 3.5rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
            text-align: center;
            position: relative;
        }

        /* تأثير التوهج خلف الصورة الشخصية */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 2rem;
        }

        .avatar-main {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--primary-blue);
            border: 4px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }

        /* أنيميشن النبض الضوئي */
        .avatar-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: var(--primary-blue);
            filter: blur(20px);
            opacity: 0.2;
            animation: pulse 3s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.3); opacity: 0.4; }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* شارة الرتبة المتطورة */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 3rem;
        }

        .badge-Admin { background: rgba(239, 68, 68, 0.1); color: var(--admin-red); border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-Manager { background: rgba(245, 158, 11, 0.1); color: var(--manager-gold); border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-User { background: rgba(16, 185, 129, 0.1); color: var(--user-green); border: 1px solid rgba(16, 185, 129, 0.2); }

        /* قسم المعلومات المنسق كأنه Dashboard */
        .info-grid {
            text-align: left;
            display: grid;
            gap: 15px;
            margin-bottom: 3rem;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.2rem 1.5rem;
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
        }

        .info-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }

        /* حالة الأمان */
        .status-verified {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--user-green);
            font-weight: 800;
            font-size: 0.8rem;
        }

        /* الأزرار */
        .action-area {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border-radius: 1.2rem;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
        }

        .btn-return {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-return:hover { background: #fff; color: #000; transform: scale(1.05); }

        .btn-edit {
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-cyan));
            color: white;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }

        .btn-edit:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.5); }

        /* إزالة الميلان */
        * { font-style: normal !important; }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <div class="profile-card">
            
            <div class="avatar-container">
                <div class="avatar-glow"></div>
                <div class="avatar-main">
                    <i class="fas fa-user-shield"></i>
                </div>
            </div>
            
            <h1>{{ user['name'] }}</h1>
            <div class="role-badge badge-{{ user['role'] }}">
                <i class="fas fa-certificate"></i>
                {{ user['role'] }} Authority
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-signature"></i> Full Name</span>
                    <span class="info-value">{{ user['name'] }}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label"><i class="fas fa-fingerprint"></i> System ID</span>
                    <span class="info-value">{{ user['email'] }}</span>
                </div>

                <div class="info-item">
                    <span class="info-label"><i class="fas fa-shield-halved"></i> Security Status</span>
                    <span class="status-verified">
                        <i class="fas fa-circle-check"></i> ENCRYPTED
                    </span>
                </div>

                <div class="info-item">
                    <span class="info-label"><i class="fas fa-lock"></i> 2FA Protocol</span>
                    <span class="info-value" style="color: var(--accent-cyan);">ACTIVE</span>
                </div>
            </div>

            <div class="action-area">
                <a href="{{ url_for('dashboard') }}" class="btn btn-return">BACK TO HUB</a>
                <button class="btn btn-edit">EDIT IDENTITY</button>
            </div>
        </div>
    </div>

</body>
</html>
