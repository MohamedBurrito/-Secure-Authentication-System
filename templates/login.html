<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Hub - Advanced Portal</title>
    <!-- استدعاء أيقونات FontAwesome للمسة احترافية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-deep: #050811;
            --primary-glow: #2563eb;
            --accent-cyan: #0ea5e9;
            --card-glass: rgba(22, 27, 38, 0.85);
            --input-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #050811);
            color: var(--text-main);
            font-family: 'Inter', sans-serif !important;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* أنيميشن دخول الكارت */
        @keyframes cardReveal {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px); /* تأثير الزجاج الضبابي */
            padding: 3rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        /* لمعان خفيف خلف الكارت */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary-glow), transparent, var(--accent-cyan));
            z-index: -1;
            border-radius: 2rem;
            opacity: 0.15;
        }

        .logo-section {
            margin-bottom: 2rem;
        }

        @keyframes shieldPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary-glow)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--primary-glow)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary-glow)); }
        }

        .logo-section i {
            font-size: 3rem;
            color: var(--primary-glow);
            animation: shieldPulse 3s infinite ease-in-out;
        }

        h1 {
            margin: 10px 0 0;
            letter-spacing: 3px;
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 600;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
            transition: transform 0.3s;
        }

        .input-wrapper:focus-within { transform: translateX(5px); }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary-glow);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.1);
        }

        .input-field:focus + i { color: var(--primary-glow); }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-cyan));
            color: white;
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -10px var(--primary-glow);
        }

        .btn-login:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 15px 30px -10px var(--primary-glow);
        }

        .footer {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 700;
            position: relative;
        }

        .footer a::after {
            content: '';
            position: absolute;
            width: 0; height: 1px;
            bottom: -2px; left: 0;
            background: var(--accent-cyan);
            transition: 0.3s;
        }

        .footer a:hover::after { width: 100%; }

        /* حل مشكلة بياض الخانات */
        input:-webkit-autofill {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-section">
            <i class="fas fa-shield-halved"></i>
            <h1>SENTINEL <span>HUB</span></h1>
            <p class="subtitle">Secure Authentication Portal</p>
        </div>

        <form method="POST">
            <div class="input-group" style="animation-delay: 0.2s;">
                <label>ACCESS IDENTIFIER</label>
                <div class="input-wrapper">
                    <input type="email" name="email" class="input-field" placeholder="name@company.com" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <div class="input-group" style="animation-delay: 0.3s;">
                <label>SECURITY KEY</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="input-field" placeholder="••••••••••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" style="animation-delay: 0.4s;">
                ESTABLISH CONNECTION <i class="fas fa-arrow-right" style="margin-left: 8px; font-size: 0.8rem;"></i>
            </button>
        </form>

        <div class="footer" style="animation-delay: 0.5s;">
            <span>NO ACCOUNT YET?</span>
            <a href="{{ url_for('register') }}">INITIALIZE SETUP</a>
        </div>
    </div>

</body>
</html>
