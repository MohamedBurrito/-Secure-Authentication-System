<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Hub | Identity Registration</title>
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-deep: #050811;
            --primary-glow: #2563eb;
            --accent-cyan: #0ea5e9;
            --card-glass: rgba(22, 27, 38, 0.85);
            --input-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success-green: #10b981;
        }

        body {
            background: radial-gradient(circle at bottom left, #1e293b, #050811);
            color: var(--text-main);
            font-family: 'Inter', sans-serif !important;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* أنيميشن الدخول للكارت */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            padding: 3rem 2.5rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-section { margin-bottom: 2rem; }
        .logo-section i {
            font-size: 2.8rem;
            color: var(--primary-glow);
            filter: drop-shadow(0 0 10px rgba(37, 99, 235, 0.3));
        }

        h1 {
            margin: 15px 0 5px;
            letter-spacing: 2px;
            font-weight: 800;
            font-size: 1.7rem;
            text-transform: uppercase;
        }

        h1 span { color: var(--primary-glow); }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            padding-left: 5px;
        }

        .input-wrapper {
            position: relative;
            transition: 0.3s;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.8rem;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary-glow);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.1);
        }

        .input-field:focus + i { color: var(--primary-glow); }

        /* ستايل مخصص للـ Select */
        select.input-field {
            appearance: none;
            cursor: pointer;
        }

        .btn-register {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-cyan));
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px -10px var(--primary-glow);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px -10px var(--primary-glow);
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--primary-glow);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .footer a:hover { color: var(--accent-cyan); }

        /* حل مشكلة بياض الخانات عند الـ Autofill */
        input:-webkit-autofill {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-section">
            <i class="fas fa-shield-halved"></i>
            <h1>SENTINEL <span>HUB</span></h1>
            <p class="subtitle">Initialize Security Protocol</p>
        </div>

        <form method="POST">
            <div class="input-group" style="animation-delay: 0.1s;">
                <label>Legal Identity Name</label>
                <div class="input-wrapper">
                    <input type="text" name="name" class="input-field" placeholder="Full Name" required>
                    <i class="fas fa-user-shield"></i>
                </div>
            </div>

            <div class="input-group" style="animation-delay: 0.2s;">
                <label>Network Communication Address</label>
                <div class="input-wrapper">
                    <input type="email" name="email" class="input-field" placeholder="email@domain.com" required>
                    <i class="fas fa-envelope-open-text"></i>
                </div>
            </div>

            <div class="input-group" style="animation-delay: 0.3s;">
                <label>Encrypted Passphrase</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="input-field" placeholder="••••••••••••" required>
                    <i class="fas fa-key"></i>
                </div>
            </div>

            <div class="input-group" style="animation-delay: 0.4s;">
                <label>System Authorization Role</label>
                <div class="input-wrapper">
                    <select name="role" class="input-field">
                        <option value="User">Standard User</option>
                        <option value="Manager">System Manager</option>
                        <option value="Admin">Master Admin</option>
                    </select>
                    <i class="fas fa-user-gear"></i>
                </div>
            </div>

            <button type="submit" class="btn-register" style="animation-delay: 0.5s;">
                ACTIVATE ACCOUNT <i class="fas fa-circle-check" style="margin-left: 8px;"></i>
            </button>
        </form>

        <div class="footer" style="animation-delay: 0.6s;">
            <span>EXISTING IDENTIFIED USER?</span>
            <a href="{{ url_for('login') }}">LOGIN TO TERMINAL</a>
        </div>
    </div>

</body>
</html>
